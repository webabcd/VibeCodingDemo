<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title {
            color: #00ff88;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            margin-bottom: 10px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .score-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 25px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-label {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .score-value {
            color: #00ff88;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .game-canvas-container {
            position: relative;
            display: flex;
            justify-content: center;
        }

        #gameCanvas {
            background: #0a0a0a;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2),
                        inset 0 0 50px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 255, 136, 0.3);
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .game-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-title {
            color: #00ff88;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .overlay-score {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(90deg, #0066ff 0%, #ff00ff 100%);
            color: #ffffff;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.5),
                        0 0 40px rgba(255, 0, 255, 0.3);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 102, 255, 0.7),
                        0 0 60px rgba(255, 0, 255, 0.5);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.5),
                        0 0 30px rgba(255, 0, 255, 0.3);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .control-btn {
            background: linear-gradient(90deg, #0066ff 0%, #ff00ff 100%);
            color: #ffffff;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.4),
                        0 0 30px rgba(255, 0, 255, 0.2);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 102, 255, 0.6),
                        0 0 50px rgba(255, 0, 255, 0.4);
        }

        .control-btn:active {
            transform: translateY(0);
            box-shadow: 0 0 10px rgba(0, 102, 255, 0.4),
                        0 0 20px rgba(255, 0, 255, 0.2);
        }

        .control-btn.active {
            background: linear-gradient(90deg, #00ccff 0%, #ff00cc 100%);
            box-shadow: 0 0 20px rgba(0, 204, 255, 0.6),
                        0 0 40px rgba(255, 0, 204, 0.4);
        }

        .instructions {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        .instructions p {
            margin: 5px 0;
        }

        .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 5px;
            margin: 0 3px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 500px) {
            .game-container {
                padding: 15px;
            }

            .game-title {
                font-size: 1.8rem;
            }

            .score-board {
                gap: 15px;
            }

            .score-item {
                padding: 8px 15px;
            }

            .score-value {
                font-size: 1.4rem;
            }

            #gameCanvas {
                width: 300px;
                height: 300px;
            }

            .game-overlay {
                width: 300px;
                height: 300px;
            }

            .controls {
                flex-wrap: wrap;
            }

            .control-btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <main class="game-container">
        <header class="game-header">
            <h1 class="game-title">🐍 贪吃蛇</h1>
        </header>

        <section class="score-board" aria-label="分数面板">
            <div class="score-item">
                <div class="score-label">当前分数</div>
                <div class="score-value" id="currentScore">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">最高分数</div>
                <div class="score-value" id="highScore">0</div>
            </div>
        </section>

        <section class="game-canvas-container">
            <canvas id="gameCanvas" width="400" height="400" aria-label="游戏画布"></canvas>
            <div class="game-overlay" id="gameOverlay">
                <h2 class="overlay-title" id="overlayTitle">准备开始</h2>
                <p class="overlay-score" id="overlayScore"></p>
                <button class="btn" id="startBtn">开始游戏</button>
            </div>
        </section>

        <section class="controls">
            <button class="control-btn" id="pauseBtn" aria-label="暂停游戏">⏸ 暂停</button>
            <button class="control-btn" id="restartBtn" aria-label="重新开始">🔄 重新开始</button>
        </section>

        <footer class="instructions">
            <p>使用 <span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span class="key">→</span> 或 <span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span> 控制方向</p>
            <p>按 <span class="key">空格</span> 暂停/继续游戏</p>
        </footer>
    </main>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const currentScoreEl = document.getElementById('currentScore');
        const highScoreEl = document.getElementById('highScore');
        const gameOverlay = document.getElementById('gameOverlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayScore = document.getElementById('overlayScore');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let foodEaten = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 500;
        const MIN_SPEED = 200;
        let isGameRunning = false;
        let isPaused = false;

        highScoreEl.textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            foodEaten = 0;
            gameSpeed = 500;
            currentScoreEl.textContent = score;
            generateFood();
        }

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            food = newFood;
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * CELL_SIZE + CELL_SIZE / 2,
                    segment.y * CELL_SIZE + CELL_SIZE / 2,
                    0,
                    segment.x * CELL_SIZE + CELL_SIZE / 2,
                    segment.y * CELL_SIZE + CELL_SIZE / 2,
                    CELL_SIZE / 2
                );

                if (index === 0) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(0, 255, 136, ${alpha})`);
                    gradient.addColorStop(1, `rgba(0, 204, 106, ${alpha})`);
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * CELL_SIZE + 1,
                    segment.y * CELL_SIZE + 1,
                    CELL_SIZE - 2,
                    CELL_SIZE - 2,
                    4
                );
                ctx.fill();

                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeOffset = 4;
                    const eyeSize = 3;
                    
                    if (direction.x === 1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * CELL_SIZE + CELL_SIZE - eyeOffset, segment.y * CELL_SIZE + eyeOffset + 2, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * CELL_SIZE + CELL_SIZE - eyeOffset, segment.y * CELL_SIZE + CELL_SIZE - eyeOffset - 2, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.x === -1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * CELL_SIZE + eyeOffset, segment.y * CELL_SIZE + eyeOffset + 2, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * CELL_SIZE + eyeOffset, segment.y * CELL_SIZE + CELL_SIZE - eyeOffset - 2, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.y === -1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * CELL_SIZE + eyeOffset + 2, segment.y * CELL_SIZE + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * CELL_SIZE + CELL_SIZE - eyeOffset - 2, segment.y * CELL_SIZE + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(segment.x * CELL_SIZE + eyeOffset + 2, segment.y * CELL_SIZE + CELL_SIZE - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * CELL_SIZE + CELL_SIZE - eyeOffset - 2, segment.y * CELL_SIZE + CELL_SIZE - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });

            const foodGradient = ctx.createRadialGradient(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                0,
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2
            );
            foodGradient.addColorStop(0, '#ff6b6b');
            foodGradient.addColorStop(1, '#ee5a5a');

            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function update() {
            direction = { ...nextDirection };

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                foodEaten++;
                score += foodEaten;
                currentScoreEl.textContent = score;
                
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }

                generateFood();

                gameSpeed = Math.max(MIN_SPEED, gameSpeed - 20);
                clearInterval(gameLoop);
                gameLoop = setInterval(gameStep, gameSpeed);
            } else {
                snake.pop();
            }
        }

        function gameStep() {
            if (!isPaused) {
                update();
                draw();
            }
        }

        function startGame() {
            if (isGameRunning) return;
            
            initGame();
            isGameRunning = true;
            isPaused = false;
            gameOverlay.classList.add('hidden');
            pauseBtn.classList.add('active');
            pauseBtn.textContent = '⏸ 暂停';
            gameLoop = setInterval(gameStep, gameSpeed);
            draw();
        }

        function pauseGame() {
            if (!isGameRunning) return;
            
            isPaused = !isPaused;
            
            if (isPaused) {
                pauseBtn.textContent = '▶ 继续';
                pauseBtn.classList.remove('active');
            } else {
                pauseBtn.textContent = '⏸ 暂停';
                pauseBtn.classList.add('active');
            }
        }

        function restartGame() {
            clearInterval(gameLoop);
            isGameRunning = false;
            isPaused = false;
            initGame();
            draw();
            showOverlay('准备开始', '');
        }

        function gameOver() {
            clearInterval(gameLoop);
            isGameRunning = false;
            isPaused = false;
            pauseBtn.classList.remove('active');
            pauseBtn.textContent = '⏸ 暂停';
            showOverlay('游戏结束', `最终得分: ${score}`);
        }

        function showOverlay(title, scoreText) {
            overlayTitle.textContent = title;
            overlayScore.textContent = scoreText;
            startBtn.textContent = isGameRunning ? '再来一局' : '开始游戏';
            gameOverlay.classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd', 'W', 'A', 'S', 'D', ' '].includes(e.key)) {
                e.preventDefault();
            }

            if (e.key === ' ') {
                if (!isGameRunning) {
                    startGame();
                } else {
                    pauseGame();
                }
                return;
            }

            if (!isGameRunning || isPaused) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', pauseGame);
        restartBtn.addEventListener('click', restartGame);

        initGame();
        draw();
    </script>
</body>
</html>
